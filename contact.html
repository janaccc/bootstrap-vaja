<!doctype html>
<html lang="sl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Festival hrane 2025 - Kontakt</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>
  <nav class="bg-light border-bottom">
    <div class="container py-3 d-flex flex-wrap gap-3 align-items-center">
      <strong>Festival hrane 2025</strong>
      <div class="ms-auto d-flex gap-3">
        <a class="link-dark" href="index.html">Domov</a>
        <a class="link-dark" href="onas.html">O festivalu</a>
        <a class="link-dark" href="contact.html">Kontakt</a>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row g-4">
      <div class="col-lg-6">
        <h1 class="mb-3">Rezervacija</h1>
        <form>
          <div class="mb-3">
            <label class="form-label" for="fullName">Ime in priimek</label>
            <input class="form-control" id="fullName" type="text" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input class="form-control" id="email" type="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="people">Število oseb</label>
            <select class="form-select" id="people" required>
              <option value="">Izberi</option>
              <option>1</option>
              <option>2</option>
              <option>3</option>
              <option>4</option>
              <option>5</option>
              <option>6</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label" for="date">Datum</label>
            <input class="form-control" id="date" type="date" required>
          </div>
          <div class="mb-3">
            <label class="form-label" for="time">Ura</label>
            <input class="form-control" id="time" type="time" required>
          </div>
          <button class="btn btn-primary" type="submit">Pošlji</button>
        </form>
      </div>
      <div class="col-lg-6">
        <h2 class="h5 mb-3">Kontakt</h2>
        <p class="mb-1">Tržna ulica 12, 1000 Ljubljana</p>
        <p class="mb-1">+386 40 123 456</p>
        <p class="mb-0">info@festivalhrane.si</p>
      </div>
    </div>
  </main>

  <footer class="bg-light border-top py-3">
    <div class="container">
      <div>© 2026 Festival hrane 2025.</div>
    </div>
  </footer>
</body>
</html>
